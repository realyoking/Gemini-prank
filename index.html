<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Automation</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #131314;
            --sidebar: #1e1f20;
            --hover: #2e2f30;
            --user-bubble: #2b2c2e;
            --text: #e3e3e3;
            --subtext: #c4c7c5;
            --blue: #8ab4f8;
            --input-bg: #1e1f20;
            --border: #3c4043;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Google Sans', sans-serif;
            height: 100vh; width: 100vw;
            display: flex; overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--sidebar); display: flex; flex-direction: column; padding: 12px; transition: width 0.3s; overflow: hidden; flex-shrink: 0; }
        .sidebar.collapsed { width: 68px; }
        .side-top { display: flex; align-items: center; gap: 20px; padding: 12px; cursor: pointer; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .nav-item:hover { background: var(--hover); }
        .collapsed .nav-text { display: none; }

        /* MAIN */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .user-pfp { width: 32px; height: 32px; background: #444; border-radius: 50%; cursor: pointer; background-size: cover; background-position: center; border: 1px solid var(--border); }

        /* CONTENT */
        #home-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-bottom: 100px; }
        .welcome-text { font-size: 40px; width: 100%; max-width: 820px; padding: 0 20px; }
        .welcome-text span { background: linear-gradient(to right, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 500; }
        
        #chat-window { flex: 1; overflow-y: auto; display: none; padding: 20px; scrollbar-width: none; }
        .chat-container { max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 40px; padding-bottom: 300px; }
        .row { display: flex; width: 100%; gap: 16px; }
        .user-row { justify-content: flex-end; }
        .user-bubble { background: var(--user-bubble); padding: 12px 20px; border-radius: 22px; max-width: 85%; }
        .ai-content { flex: 1; }
        .ai-code { background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 16px; font-family: monospace; color: #76d9ff; margin: 12px 0; }
        .msg-img { max-width: 350px; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); }

        /* BOTTOM INPUT */
        .bottom-area { position: absolute; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, var(--bg) 40%); display: flex; flex-direction: column; align-items: center; }
        .input-pill { width: 100%; max-width: 820px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 28px; padding: 16px 24px; display: flex; flex-direction: column; min-height: 140px; }
        #main-input { background: transparent; border: none; color: white; font-size: 16px; outline: none; width: 100%; resize: none; flex: 1; }
        .pill-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }

        /* TOOLS PANEL */
        #tools-modal {
            position: absolute; bottom: 180px; width: 440px; background: #202124; border: 1px solid var(--border);
            border-radius: 24px; padding: 20px; display: none; z-index: 1000; max-height: 70vh; overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .label { font-size: 11px; color: var(--blue); font-weight: bold; margin: 15px 0 5px; display: block; text-transform: uppercase; }
        .field { width: 100%; background: #131314; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; outline: none; }
        .field:focus { border-color: var(--blue); }
        
        .queue-item { 
            background: #2b2c2e; padding: 10px; border-radius: 10px; margin-bottom: 8px; 
            display: flex; flex-direction: column; gap: 4px; font-size: 12px; border: 1px solid #444;
        }
        .queue-header { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding-bottom: 4px; margin-bottom: 4px; }
        .del-btn { color: #ff6b6b; cursor: pointer; font-weight: bold; }
        .trigger-tag { color: var(--blue); font-weight: bold; font-size: 10px; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="side-top" onclick="toggleSidebar()">
        <svg width="24" height="24" fill="white"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        <span class="nav-text" style="font-size:18px; margin-left:10px;">Gemini</span>
    </div>
    <div class="nav-item" onclick="location.reload()">
        <svg width="20" height="20" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        <span class="nav-text">New chat</span>
    </div>
</div>

<div class="main">
    <header><div></div><div class="user-pfp" id="user-avatar" onclick="toggleTools()"></div></header>

    <div id="home-screen">
        <div class="welcome-text">Hi <span id="display-name">User</span><br><span>Where should we start?</span></div>
    </div>

    <div id="chat-window"><div class="chat-container" id="chat-wall"></div></div>

    <div class="bottom-area">
        <div id="tools-modal">
            <span class="label">Identity Settings</span>
            <input type="text" class="field" placeholder="Custom Name..." oninput="document.getElementById('display-name').innerText = this.value || 'User'">
            <input type="file" id="pfp-up" class="field" title="Upload User PFP">

            <span class="label">Response Architect</span>
            <input type="text" id="trigger-word" class="field" placeholder="Optional Trigger (Keyword/Number)">
            <input type="number" id="trigger-count" class="field" placeholder="Trigger Limit (0 = Infinite)" value="1">
            
            <textarea id="ai-text" class="field" rows="2" placeholder="AI Message Text..."></textarea>
            <textarea id="ai-code" class="field" rows="2" placeholder="AI Code Block..."></textarea>
            <input type="file" id="ai-img" class="field" title="AI Image Attachment">
            
            <button onclick="addToQueue()" style="width:100%; padding:12px; border:none; border-radius:8px; background:var(--blue); color:black; font-weight:bold; cursor:pointer; margin-top:5px;">Schedule Response</button>

            <span class="label">Upcoming Queue</span>
            <div id="queue-list"><div style="opacity:0.5; font-size:12px;">No replies scheduled</div></div>
            
            <button onclick="toggleTools()" style="width:100%; padding:10px; margin-top:15px; background:transparent; border:1px solid #444; color:white; border-radius:8px; cursor:pointer;">Exit Tools</button>
        </div>

        <div class="input-pill">
            <div id="user-img-preview" style="display:none; margin-bottom:10px;"><img id="pre-img" style="height:60px; border-radius:8px; border: 1px solid var(--border);"></div>
            <textarea id="main-input" placeholder="Ask Gemini" rows="1" onkeypress="if(event.key==='Enter'){event.preventDefault(); handleSend();}"></textarea>
            <div class="pill-footer">
                <div style="display:flex; gap:20px;">
                    <label for="user-img-up" style="cursor:pointer; opacity:0.8;"><svg width="22" height="22" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></label>
                    <input type="file" id="user-img-up" style="display:none;" accept="image/*">
                    <div onclick="toggleTools()" style="display:flex; align-items:center; gap:8px; cursor:pointer; opacity:0.8;">
                        <svg width="20" height="20" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14h-2v-4h2v4zm0-6h-2V8h2v2z"/></svg>
                        <span style="font-size:14px;">Tools & Queue</span>
                    </div>
                </div>
                <div style="display:flex; align-items:center; gap:15px;">
                    <span style="font-size:14px; opacity:0.6;">Fast ▾</span>
                    <svg onclick="handleSend()" width="24" height="24" fill="var(--blue)" style="cursor:pointer;"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </div>
            </div>
        </div>
        <p style="font-size:12px; color:var(--subtext); margin-top:12px;">Gemini is AI and can make mistakes.</p>
    </div>
</div>

<script>
    const sparkle = `<svg width="24" height="24" style="margin-top:4px; flex-shrink:0;"><path d="M12 22C12 22 12 17.5 15.5 14C19 10.5 23.5 10.5 23.5 10.5C23.5 10.5 19 10.5 15.5 7C12 3.5 12 0 12 0C12 0 12 3.5 8.5 7C5 10.5 0.5 10.5 0.5 10.5C0.5 10.5 5 10.5 8.5 14C12 17.5 12 22 12 22Z" fill="#8ab4f8"/></svg>`;
    let queue = [];
    let userImgData = '';
    let tempAiImg = '';

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function toggleTools() { const m = document.getElementById('tools-modal'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }

    // File Handling
    document.getElementById('pfp-up').onchange = (e) => {
        const r = new FileReader(); r.onload = (f) => document.getElementById('user-avatar').style.backgroundImage = `url(${f.target.result})`;
        r.readAsDataURL(e.target.files[0]);
    };
    document.getElementById('ai-img').onchange = (e) => {
        const r = new FileReader(); r.onload = (f) => tempAiImg = f.target.result;
        r.readAsDataURL(e.target.files[0]);
    };
    document.getElementById('user-img-up').onchange = (e) => {
        const r = new FileReader(); r.onload = (f) => {
            userImgData = f.target.result;
            document.getElementById('pre-img').src = userImgData;
            document.getElementById('user-img-preview').style.display = 'block';
        };
        r.readAsDataURL(e.target.files[0]);
    };

    function addToQueue() {
        const trigger = document.getElementById('trigger-word').value;
        const count = parseInt(document.getElementById('trigger-count').value) || 0;
        const txt = document.getElementById('ai-text').value;
        const code = document.getElementById('ai-code').value;
        
        if(!txt && !code && !tempAiImg) return;

        queue.push({ trigger, count, txt, code, img: tempAiImg });
        
        // Reset Builder
        document.getElementById('ai-text').value = '';
        document.getElementById('ai-code').value = '';
        document.getElementById('trigger-word').value = '';
        tempAiImg = '';
        renderQueue();
    }

    function renderQueue() {
        const l = document.getElementById('queue-list');
        if(queue.length === 0) { l.innerHTML = '<div style="opacity:0.5; font-size:12px;">No replies scheduled</div>'; return; }
        l.innerHTML = queue.map((it, i) => `
            <div class="queue-item">
                <div class="queue-header">
                    <span class="trigger-tag">${it.trigger ? 'TRIGGER: '+it.trigger : 'SEQUENTIAL'}</span>
                    <span class="del-btn" onclick="queue.splice(${i},1);renderQueue();">×</span>
                </div>
                <div style="opacity:0.8">${it.txt ? it.txt.substring(0,30)+'...' : (it.code ? 'Code Block' : 'Image only')}</div>
                <div style="font-size:10px; opacity:0.5;">Limit: ${it.count === 0 ? '∞' : it.count}</div>
            </div>
        `).join('');
    }

    function handleSend() {
        const input = document.getElementById('main-input');
        const wall = document.getElementById('chat-wall');
        const val = input.value.trim();
        if (!val && !userImgData) return;

        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('chat-window').style.display = 'block';

        let userHtml = `<div class="row user-row"><div class="user-bubble">`;
        if (userImgData) userHtml += `<img src="${userImgData}" class="msg-img"><br>`;
        if (val) userHtml += val;
        userHtml += `</div></div>`;
        wall.innerHTML += userHtml;

        const currentVal = val;
        input.value = '';
        userImgData = '';
        document.getElementById('user-img-preview').style.display = 'none';
        scroll();

        setTimeout(() => {
            let reply = null;
            // 1. Check for Trigger matches first
            const triggerIdx = queue.findIndex(q => q.trigger && currentVal.toLowerCase().includes(q.trigger.toLowerCase()));
            
            if (triggerIdx !== -1) {
                reply = queue[triggerIdx];
                if (reply.count > 0) {
                    reply.count--;
                    if (reply.count === 0) queue.splice(triggerIdx, 1);
                }
            } 
            // 2. If no trigger matches, take the first item that has NO trigger (Sequential)
            else {
                const seqIdx = queue.findIndex(q => !q.trigger);
                if (seqIdx !== -1) {
                    reply = queue.splice(seqIdx, 1)[0];
                }
            }

            let aiHtml = `<div class="row">${sparkle}<div class="ai-content">`;
            if (reply) {
                if (reply.txt) aiHtml += `<div>${reply.txt.replace(/\n/g, '<br>')}</div>`;
                if (reply.code) aiHtml += `<div class="ai-code">${reply.code}</div>`;
                if (reply.img) aiHtml += `<img src="${reply.img}" class="msg-img">`;
                renderQueue();
            } else {
                aiHtml += `<div>How can I help you today?</div>`;
            }
            aiHtml += `</div></div>`;
            wall.innerHTML += aiHtml;
            scroll();
        }, 800);
    }

    function scroll() { const w = document.getElementById('chat-window'); w.scrollTo({ top: w.scrollHeight, behavior: 'smooth' }); }
</script>
</body>
</html>
