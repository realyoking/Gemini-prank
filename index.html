<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #131314;
            --sidebar-color: #1e1f20;
            --text-main: #e3e3e3;
            --text-secondary: #c4c7c5;
            --input-bg: #1e1f20;
            --user-msg-bg: #2b2c2e;
            --accent-blue: #4285f4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Google Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .new-chat-btn {
            background: #2b2c2e;
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            width: fit-content;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Main Chat Area */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15% 100px 15%;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Messages */
        .message {
            display: flex;
            gap: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .ai-avatar {
            background: linear-gradient(45deg, #4285f4, #9b72cb, #d96570);
        }

        .user-avatar {
            background: #555;
        }

        .content {
            line-height: 1.6;
            width: 100%;
        }

        .msg-image {
            max-width: 300px;
            border-radius: 12px;
            margin-top: 10px;
            display: block;
        }

        .source-tag {
            display: inline-block;
            background: #2b2c2e;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--accent-blue);
            margin-top: 10px;
            text-decoration: none;
        }

        /* Input Section */
        .input-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px 15%;
            background: linear-gradient(transparent, var(--bg-color) 30%);
        }

        .input-wrapper {
            background: var(--input-bg);
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
            margin-bottom: 5px;
        }

        .control-input {
            background: #2b2c2e;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
        }

        .text-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
            padding: 10px 0;
        }

        .send-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--accent-blue);
            font-weight: bold;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <button class="new-chat-btn">＋ New Chat</button>
</div>

<div class="main-container">
    <div class="chat-history" id="chatHistory">
        <div class="message">
            <div class="avatar ai-avatar"></div>
            <div class="content">
                <h2>Hello, I'm Gemini</h2>
                <p>How can I help you today? You can customize my response using the fields below.</p>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <div class="controls">
                <input type="text" id="imgUrl" class="control-input" placeholder="Paste Image URL (Optional)">
                <input type="text" id="sourceUrl" class="control-input" placeholder="Source Link (Optional)">
            </div>
            
            <div class="text-input-row">
                <input type="text" id="userInput" placeholder="Enter text for AI to 'say'...">
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    const chatHistory = document.getElementById('chatHistory');

    function sendMessage() {
        const text = document.getElementById('userInput').value;
        const img = document.getElementById('imgUrl').value;
        const source = document.getElementById('sourceUrl').value;

        if (!text && !img) return;

        // 1. Add User Message (Simulation)
        appendMessage('user', text || "Customized prompt sent");

        // 2. Add Gemini Response (Customized)
        setTimeout(() => {
            appendMessage('ai', text, img, source);
            // Clear inputs
            document.getElementById('userInput').value = '';
            document.getElementById('imgUrl').value = '';
            document.getElementById('sourceUrl').value = '';
        }, 600);
    }

    function appendMessage(role, text, img = '', source = '') {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message';
        
        const avatarClass = role === 'ai' ? 'ai-avatar' : 'user-avatar';
        
        let html = `
            <div class="avatar ${avatarClass}"></div>
            <div class="content">
                <p>${text}</p>
        `;

        if (img) {
            html += `<img src="${img}" class="msg-image" onerror="this.style.display='none'">`;
        }

        if (source) {
            html += `<a href="${source}" target="_blank" class="source-tag">Source: ${source.substring(0, 30)}...</a>`;
        }

        html += `</div>`;
        msgDiv.innerHTML = html;
        chatHistory.appendChild(msgDiv);
        
        // Scroll to bottom
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }
</script>

</body>
</html>
